<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EHRGym</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .logo {
            width: 120px;
            user-select: none;
            pointer-events: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            margin-top: 0.1rem;
            font-size: 3rem;
            color: #000000;
            user-select: none;
        }

        .title-bold {
            font-weight: 800;
        }

        .title-regular {
            font-weight: 300;
        }

        .coming-soon {
            margin-top: 1.5rem;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: #000000;
            text-transform: uppercase;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="ehrgym_logo.png" alt="EHRGym" class="logo">
        <p class="title"><span class="title-bold">EHR</span><span class="title-regular">Gym</span></p>
        <p class="coming-soon">Coming Soon</p>
    </div>
</body>
</html>
